<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>බස් සේවා - බලංගොඩ</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>


 <header class="header">
  <div style="position:fixed; left:0; top:0;"><img src="hero.png" style="height:50px;"></div>
  <div style="position:fixed; top:8px; right:20px; color:#cfc9fc; text-align:right; font-size:14px;">
    <span style="color:#ffffff;"><b>ප්‍රවාහන බස් </b></span>සේවා<br>
    <span style="color:#dfb3fd; font-size:12px; font-weight:bold;"><i>බලංගොඩ </i></span>
  </div>
  <hr class="hr1"/>
 </header>
  
<main class="main-container">
  <div class="left-panel">
    <div class="card">
      <label>බස් මාර්ගය</label>
      <select id="routeSelect">
        <option value="BL-01" selected>බලංගොඩ-වේලිඔය-හම්බෙගමුව</option>
        <option value="BL-02">බලංගොඩ-වැලිපතයාය-කල්තොට</option>
        <option value="BL-03">බලංගොඩ-රජවක-මුල්ගම</option>
      </select> 

      <lable style="display: block;
  padding: 2px;
  color: var(--accent);
  font-weight: bold;
  font-size: 14px;">බස් සේවාව</lable>
      
  <select id="bus-service">
    
  <option value="normal" selected>සාමාන්‍ය (ලංගම සහ පුද්ගලික)</option>
  <option value="express">දුර ගමන් සේවා</option>
  <option value="AC">AC</option>
    <option value="sltb" >ශ්‍රී ලංගම</option>
  <option value="private">පුද්ගලික</option>
  </select>
      
      
      
      <label>ගමනාරමිභය</label>
      <select id="fromSelect">
        <option value="Balangoda" selected>බලංගොඩ</option>
        <option value="Kirimatitenna">කිරිමැටිතැන්න</option>
        <option value="Depalamulla">දෙපෑලමුල්ල</option>
        <option value="Bowatta">බෝවත්ත</option>
        <option value="Rajavaka">රජවක</option>
        <option value="Kaltota">කල්තොට</option>
        <option value="Welioya">වේලිඔය</option>
      </select>

      <label>ගමනාන්තය</label>
      <select id="toSelect">
        <option value="Balangoda">බලංගොඩ</option>
        <option value="Kirimatitenna">කිරිමැටිතැන්න</option>
        <option value="Depalamulla">දෙපෑලමුල්ල</option>
        <option value="Bowatta">බෝවත්ත</option>
        <option value="Rajavaka">රජවක</option>
        <option value="Kaltota">කල්තොට</option>
        <option value="Welioya" selected>වේලිඔය</option>
      </select>
      
      
      
      <label>වේලාව</label>
      <input type="time" id="timeInput"> 
      
      
      
      <div class="searchBtn" id="searchBtn">සොයන්න</div>
    </div> 

    <div class="card result-card">
      <span class="pill" id="servicePill" style="display:none;"></span>
      <label style="color:#c6b6fc; margin:0; font-size:16px;">ප්‍රතිපල</label>
      <h2 id="resultTitle" style="margin:10px 0 5px 0;">--</h2>
      <h1 id="resultTime" style="margin: 0 0 10px 0; font-size:36px;">--:--</h1>
      <div class="nav-btns">
        <button class="btn-sm" id="prevBusBtn"><i class="fa fa-chevron-left"></i> පසුගිය</button>
        <button class="btn-sm" id="nextBusBtn">මීළඟ <i class="fa fa-chevron-right"></i></button>
      </div>
    </div> 
    
    <div class="card">
      <label>බස් සිමියුලේටරය (GPX)</label>
      <input type="file" id="gpxFile" accept=".gpx" style="border:none; padding:0;">
      <div class="nav-btns">
        <button class="btn-sm" id="startSimBtn" style="background:#5742ff;color:#ffffff; font-weight:bold;">ආරම්භ කරන්න</button>
        <button class="btn-sm" id="stopSimBtn" style="background:#5742ff;">නවත්වන්න</button>
      </div>
    </div>
  </div>

  
<div class="map-container">
    <div id="map"></div>
    <div class="map-buttons">
      <button id="setFromBtn" title="Set From"><i class="fa fa-location-dot"></i></button>
      <button id="setToBtn" title="Set To"><i class="fa fa-location-pin"></i></button>
      <button id="centerBtn" title="Center"><i class="fa fa-location-crosshairs"></i></button>
    </div>
</div>
  
</main>

<footer class="footer">
  <nav>
    <div>Buses</div>
    <div>Map</div>
    <div>Saved</div>
    <div>Settings</div>
  </nav>
</footer>
<script src="app.js"></script>
</body>
</html>
